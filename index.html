<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --income-color: #2ecc71;
            --expense-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 { text-align: center; color: var(--primary-color); }

        /* Dashboard Cards */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h3 { margin: 0; font-size: 0.9rem; color: #777; }
        .card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: bold; }

        .balance-val { color: var(--primary-color); }
        .income-val { color: var(--income-color); }
        .expense-val { color: var(--expense-color); }

        /* Budget Alert Section */
        .budget-section {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #alert-msg {
            color: var(--expense-color);
            font-weight: bold;
            display: none;
        }

        /* Form Styling */
        .form-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 10px;
        }

        input, select, button {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background: #357abd; }

        /* Monthly Summary & List */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .list-section, .summary-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
        }

        ul { list-style: none; padding: 0; }
        li {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .type-inc { border-left: 5px solid var(--income-color); }
        .type-exp { border-left: 5px solid var(--expense-color); }

        @media (max-width: 600px) {
            .form-group { grid-template-columns: 1fr; }
            .main-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Expense Tracker</h1>

    <!-- Dashboard -->
    <div class="dashboard">
        <div class="card">
            <h3>Total Balance</h3>
            <p id="balance" class="balance-val">$0.00</p>
        </div>
        <div class="card">
            <h3>Income</h3>
            <p id="income" class="income-val">$0.00</p>
        </div>
        <div class="card">
            <h3>Expenses</h3>
            <p id="expense" class="expense-val">$0.00</p>
        </div>
    </div>

    <!-- Budget Alert -->
    <div class="budget-section">
        <div>
            <label>Monthly Budget Limit: </label>
            <input type="number" id="budget-input" placeholder="Set limit" value="1000" style="width: 100px;">
        </div>
        <div id="alert-msg">⚠️ Budget Exceeded!</div>
    </div>

    <!-- Input Form -->
    <div class="form-container">
        <h3>Add New Transaction</h3>
        <form id="transaction-form">
            <div class="form-group">
                <input type="number" id="amount" placeholder="Amount (e.g. 50)" required>
                <select id="category">
                    <option value="Income">Income</option>
                    <option value="Food">Food</option>
                    <option value="Travel">Travel</option>
                    <option value="Bills">Bills</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Other">Other</option>
                </select>
                <input type="date" id="date" required>
                <button type="submit">Add</button>
            </div>
        </form>
    </div>

    <div class="main-content">
        <!-- Transaction History -->
        <div class="list-section">
            <h3>Recent History</h3>
            <ul id="history"></ul>
        </div>

        <!-- Monthly Breakdown -->
        <div class="summary-section">
            <h3>Monthly Category Summary</h3>
            <ul id="monthly-summary"></ul>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('transaction-form');
    const historyList = document.getElementById('history');
    const monthlySummaryList = document.getElementById('monthly-summary');
    const balanceEl = document.getElementById('balance');
    const incomeEl = document.getElementById('income');
    const expenseEl = document.getElementById('expense');
    const budgetInput = document.getElementById('budget-input');
    const alertMsg = document.getElementById('alert-msg');

    // Load data from LocalStorage
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    function updateLocalStorage() {
        localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    function addTransaction(e) {
        e.preventDefault();
        
        const amount = parseFloat(document.getElementById('amount').value);
        const category = document.getElementById('category').value;
        const date = document.getElementById('date').value;

        const transaction = {
            id: Math.random(),
            amount,
            category,
            date,
            type: category === 'Income' ? 'income' : 'expense'
        };

        transactions.push(transaction);
        init();
        updateLocalStorage();
        form.reset();
    }

    function calculateValues() {
        const income = transactions
            .filter(t => t.type === 'income')
            .reduce((acc, t) => acc + t.amount, 0);

        const expenses = transactions
            .filter(t => t.type === 'expense')
            .reduce((acc, t) => acc + t.amount, 0);

        const balance = income - expenses;

        balanceEl.innerText = `$${balance.toFixed(2)}`;
        incomeEl.innerText = `$${income.toFixed(2)}`;
        expenseEl.innerText = `$${expenses.toFixed(2)}`;

        // Budget Alert Logic
        const limit = parseFloat(budgetInput.value);
        if (expenses > limit) {
            alertMsg.style.display = 'block';
        } else {
            alertMsg.style.display = 'none';
        }
    }

    function displayHistory() {
        historyList.innerHTML = '';
        transactions.slice().reverse().forEach(t => {
            const li = document.createElement('li');
            li.classList.add(t.type === 'income' ? 'type-inc' : 'type-exp');
            li.innerHTML = `
                <span>${t.date} - ${t.category}</span>
                <span>${t.type === 'income' ? '+' : '-'}$${Math.abs(t.amount).toFixed(2)}</span>
            `;
            historyList.appendChild(li);
        });
    }

    function displayMonthlySummary() {
        monthlySummaryList.innerHTML = '';
        const currentMonth = new Date().getMonth();
        const currentYear = new Date().getFullYear();

        const monthlyData = transactions.filter(t => {
            const tDate = new Date(t.date);
            return tDate.getMonth() === currentMonth && tDate.getFullYear() === currentYear && t.type === 'expense';
        });

        const categories = {};
        monthlyData.forEach(t => {
            categories[t.category] = (categories[t.category] || 0) + t.amount;
        });

        for (const [cat, total] of Object.entries(categories)) {
            const li = document.createElement('li');
            li.innerHTML = `<span>${cat}</span> <span>$${total.toFixed(2)}</span>`;
            monthlySummaryList.appendChild(li);
        }
    }

    function init() {
        calculateValues();
        displayHistory();
        displayMonthlySummary();
    }

    form.addEventListener('submit', addTransaction);
    budgetInput.addEventListener('input', calculateValues);

    // Set default date to today
    document.getElementById('date').valueAsDate = new Date();

    init();
</script>

</body>
</html>
